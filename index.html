<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>н”„лһ‘мҠӨм–ҙ м•”нҳё м ңмһ‘кё°</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #34495e; }
        input[type="number"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        textarea { height: 120px; resize: none; margin-bottom: 1rem; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; font-size: 1rem; }
        .btn-encrypt { background-color: #3498db; color: white; }
        .btn-encrypt:hover { background-color: #2980b9; }
        .btn-decrypt { background-color: #2ecc71; color: white; }
        .btn-decrypt:hover { background-color: #27ae60; }
        .result-area { background-color: #f9f9f9; border: 1px dashed #cbd5e0; padding: 10px; border-radius: 8px; min-height: 50px; word-break: break-all; color: #2d3748; }
    </style>
</head>
<body>

<div class="container">
    <h1>рҹҮ«рҹҮ· Chiffrement FranГ§ais</h1>
    
    <div class="input-group">
        <label for="key">лӮңмҲҳ (м•”нҳё нӮӨ)</label>
        <input type="number" id="key" placeholder="мҲ«мһҗлҘј мһ…л Ҙн•ҳм„ёмҡ” (мҳҲ: 12345)" value="1">
    </div>

    <div class="input-group">
        <label for="inputText">н…ҚмҠӨнҠё мһ…л Ҙ</label>
        <textarea id="inputText" placeholder="м•”нҳёнҷ”н•ҳкұ°лӮҳ н•ҙлҸ…н•  н”„лһ‘мҠӨм–ҙ л¬ёмһҘмқ„ мһ…л Ҙн•ҳм„ёмҡ”..."></textarea>
    </div>

    <div class="buttons">
        <button class="btn-encrypt" onclick="process(true)">м•”нҳё м ңмһ‘ (Encrypt)</button>
        <button class="btn-decrypt" onclick="process(false)">м•”нҳё н•ҙлҸ… (Decrypt)</button>
    </div>

    <label>кІ°кіј</label>
    <textarea id="outputText" readonly placeholder="кІ°кіјк°Җ м—¬кё°м—җ н‘ңмӢңлҗ©лӢҲлӢӨ..."></textarea>
</div>

<script>
    // н”„лһ‘мҠӨм–ҙ м•ҢнҢҢлІі + м•…мғҒ кё°нҳё + м–ҙнҚјмҠӨнҠёлЎңн”ј
    const baseChars = "abcdefghijklmnopqrstuvwxyzГ ГўГ©ГЁГӘГ«Г®ГҜГҙГ»Г№Г§'".split("");
    const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZГҖГӮГүГҲГҠГӢГҺГҸГ”ГӣГҷГҮ".split("");

    // лӮңмҲҳлҘј мқҙмҡ©н•ң мӢңл“ң кё°л°ҳ м…”н”Ң н•ЁмҲҳ
    function seededShuffle(array, seed) {
        let m = array.length, t, i;
        const copy = [...array];
        while (m) {
            i = Math.floor(random(seed++) * m--);
            t = copy[m];
            copy[m] = copy[i];
            copy[i] = t;
        }
        return copy;
    }

    // к°„лӢЁн•ң мқҳмӮ¬ лӮңмҲҳ мғқм„ұкё°
    function random(seed) {
        var x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }

    function process(isEncrypt) {
        const seed = parseInt(document.getElementById('key').value) || 0;
        const text = document.getElementById('inputText').value;
        
        // мҶҢл¬ёмһҗмҷҖ лҢҖл¬ёмһҗ к°Ғк°Ғ м…”н”Ңлҗң л§ө мғқм„ұ
        const shuffledBase = seededShuffle(baseChars, seed);
        const shuffledUpper = seededShuffle(upperChars, seed);

        let result = "";

        for (let char of text) {
            if (baseChars.includes(char)) {
                const index = isEncrypt ? baseChars.indexOf(char) : shuffledBase.indexOf(char);
                result += isEncrypt ? shuffledBase[index] : baseChars[index];
            } else if (upperChars.includes(char)) {
                const index = isEncrypt ? upperChars.indexOf(char) : shuffledUpper.indexOf(char);
                result += isEncrypt ? shuffledUpper[index] : upperChars[index];
            } else {
                // кіөл°ұ, мҲ«мһҗ, л¬ёмһҘ л¶Җнҳё л“ұмқҖ к·ёлҢҖлЎң мң м§Җ
                result += char;
            }
        }

        document.getElementById('outputText').value = result;
    }
</script>

</body>
</html>
